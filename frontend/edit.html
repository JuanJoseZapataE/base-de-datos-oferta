<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Editar ficha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root{ --sena-green:#007a3d; --sena-green-dark:#005a2a; --sena-green-light:#e9f7ec; }
      body { background: var(--sena-green-light); }
      .card { border: 1px solid rgba(0,0,0,0.04); }
      h3 { color: var(--sena-green-dark); }
      .btn-primary { background-color: var(--sena-green); border-color: var(--sena-green-dark); }
    </style>
</head>
<body class="p-4">
  <div class="container">
    <h3 id="title">Editar ficha</h3>
    <div id="status" class="mb-2 text-muted"></div>
    <form id="editForm">
      <div class="row g-2" id="fields">
        <!-- Campos dinámicos -->
      </div>
      <div class="mt-3">
        <button id="saveBtn" class="btn btn-primary" type="submit">Guardar</button>
        <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
      </div>
    </form>
  </div>
  <script src="edit.js"></script>
</body>
</html>
